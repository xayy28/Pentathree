name: Laravel CI/CD Pipeline

on:
  push:
    branches: [main, testing]
  pull_request:
    branches: [main, testing]

jobs:
  backend:
    name: 🐘 Backend (PHP & Tests)
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🐘 Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: mbstring, pdo, pdo_sqlite, sqlite3, bcmath, ctype, fileinfo, json, tokenizer, xml
          coverage: none

      - name: 📦 Install Composer dependencies
        run: composer update --no-interaction --prefer-dist --optimize-autoloader --no-progress --ignore-platform-reqs

      - name: 🔧 Prepare Laravel environment
        run: |
          cp .env.example .env
          php artisan key:generate

      - name: 🗄️ Setup SQLite database
        run: |
          mkdir -p database
          touch database/database.sqlite

      - name: 🗃️ Run migrations
        env:
          DB_CONNECTION: sqlite
          DB_DATABASE: database/database.sqlite
        run: php artisan migrate --force

      - name: ✅ Run tests (Pest)
        env:
          DB_CONNECTION: sqlite
          DB_DATABASE: database/database.sqlite
        run: php artisan test

      - name: 🎨 Check code style (Laravel Pint)
        run: vendor/bin/pint --test

  frontend:
    name: 🎨 Frontend (Node & Build)
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: 📦 Install NPM dependencies
        run: npm install

      - name: 🏗️ Build assets (Vite)
        run: npm run build

      - name: ✅ Verify build output
        run: |
          test -d public/build || (echo "❌ Build directory not found!" && exit 1)
          test -f public/build/manifest.json || (echo "❌ manifest.json not found!" && exit 1)
          echo "✅ Build output verified successfully"

  merge-gate:
    name: 🚦 Merge Gate
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    if: always()

    steps:
      - name: 🔍 Check job results
        run: |
          if [ "${{ needs.backend.result }}" != "success" ] || [ "${{ needs.frontend.result }}" != "success" ]; then
            echo "❌ One or more checks failed. Merge is NOT safe."
            exit 1
          fi
          echo "✅ All checks passed. Safe to merge!"
