name: Laravel CI/CD Pipeline

on:
  push:
    branches: [main, testing]
  pull_request:
    branches: [main, testing]

jobs:
  # ============================================================
  # JOB 1: Backend — PHP Tests & Code Quality
  # ============================================================
  backend:
    name: 🐘 Backend (PHP ${{ matrix.php }})
    runs-on: ubuntu-latest

    strategy:
      matrix:
        php: ['8.3']

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🐘 Setup PHP ${{ matrix.php }}
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: mbstring, pdo, pdo_sqlite, sqlite3, bcmath, ctype, fileinfo, json, tokenizer, xml
          coverage: none

      - name: 📦 Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: vendor
          key: composer-${{ runner.os }}-php${{ matrix.php }}-${{ hashFiles('composer.lock') }}
          restore-keys: |
            composer-${{ runner.os }}-php${{ matrix.php }}-

      - name: 📦 Install Composer dependencies
        run: composer install --no-interaction --prefer-dist --optimize-autoloader --no-progress

      - name: 🔧 Prepare Laravel environment
        run: |
          cp .env.example .env
          php artisan key:generate

      - name: 🗄️ Setup SQLite database
        run: |
          mkdir -p database
          touch database/database.sqlite

      - name: 🗃️ Run migrations
        env:
          DB_CONNECTION: sqlite
          DB_DATABASE: database/database.sqlite
        run: php artisan migrate --force

      - name: ✅ Run tests (Pest)
        env:
          DB_CONNECTION: sqlite
          DB_DATABASE: database/database.sqlite
        run: php artisan test

      - name: 🎨 Check code style (Laravel Pint)
        run: vendor/bin/pint --test

  # ============================================================
  # JOB 2: Frontend — Tailwind CSS & Vite Build
  # ============================================================
  frontend:
    name: 🎨 Frontend (Node ${{ matrix.node }})
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node: ['22']

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js ${{ matrix.node }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: 'npm'

      - name: 📦 Install NPM dependencies
        run: npm ci

      - name: 🏗️ Build assets (Vite + Tailwind)
        run: npm run build

      - name: ✅ Verify build output exists
        run: |
          echo "Checking build output..."
          test -d public/build || (echo "❌ Build directory not found!" && exit 1)
          test -f public/build/manifest.json || (echo "❌ manifest.json not found!" && exit 1)
          echo "✅ Build output verified successfully"
          echo ""
          echo "📁 Build contents:"
          ls -la public/build/
          echo ""
          echo "📄 Manifest:"
          cat public/build/manifest.json

  # ============================================================
  # JOB 3: Final merge gate — only passes if both jobs succeed
  # ============================================================
  merge-gate:
    name: 🚦 Merge Gate
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    if: always()

    steps:
      - name: 🔍 Check job results
        run: |
          echo "Backend:  ${{ needs.backend.result }}"
          echo "Frontend: ${{ needs.frontend.result }}"

          if [ "${{ needs.backend.result }}" != "success" ] || [ "${{ needs.frontend.result }}" != "success" ]; then
            echo ""
            echo "❌ One or more checks failed. Merge is NOT safe."
            exit 1
          fi

          echo ""
          echo "✅ All checks passed. Safe to merge!"
